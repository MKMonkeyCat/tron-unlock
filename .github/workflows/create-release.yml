name: Create Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Tag pushes always build a versioned release; workflow_dispatch is only
    # meaningful when run against main, where it produces a "latest" build.
    if: github.ref_type == 'tag' || github.ref_name == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "type=release" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "type=latest" >> "$GITHUB_OUTPUT"
            echo "tag_name=$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0-dev.$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package version
        run: npm pkg set version="${{ steps.version.outputs.version }}"

      - name: Build extension and userscript
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp dist-userscript/main.user.js "release/TronUnlock-${{ steps.version.outputs.version }}.user.js"

      - name: Generate release notes
        id: release_notes
        run: |
          if [[ "${{ steps.version.outputs.type }}" == "release" ]]; then
            NOTES=$(git log -1 --pretty=format:"%s%n%n%b")
          else
            NOTES=$(git log -10 --pretty=format:"- %s (%h)")
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.type == 'release' && 'Release' || 'Latest Version' }} ${{ steps.version.outputs.tag_name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
